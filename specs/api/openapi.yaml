openapi: 3.0.3
info:
  title: Kea Fabric API
  version: "1.0.0"
  description: >
    Versioned HTTP API for Kea Fabric operator surfaces. DTOs use DHCP-neutral
    field names at the boundary (no Kea-specific types in public schemas).
servers:
  - url: /api/v1
    description: Relative to the operator origin
security:
  - BearerAuth: []
paths:
  /health:
    get:
      operationId: getHealth
      summary: Liveness and dependency summary for admin surfaces
      tags: [Admin]
      security: []
      responses:
        "200":
          description: Health snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /admin/replication/summary:
    get:
      operationId: getNebulaReplicationSummary
      summary: Read-only Nebula replication observation (mock in Phase B)
      tags: [Admin]
      responses:
        "200":
          description: Replication posture snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NebulaReplicationSummary"
  /meta:
    get:
      operationId: getMeta
      summary: Runtime metadata for the shell
      tags: [Meta]
      responses:
        "200":
          description: Metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetaResponse"
  /plugins:
    get:
      operationId: listPlugins
      summary: Installed plugins with optional dashboard manifest
      tags: [Plugins]
      responses:
        "200":
          description: Plugin list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginListResponse"
  /dashboards/{dashboardId}/layout:
    get:
      operationId: getDashboardLayout
      summary: Saved dashboard layout for the operator shell
      tags: [Dashboard]
      parameters:
        - $ref: "#/components/parameters/DashboardId"
      responses:
        "200":
          description: Layout document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardLayout"
    put:
      operationId: putDashboardLayout
      summary: Replace dashboard layout (last-write-wins; validate against layout schema server-side)
      tags: [Dashboard]
      parameters:
        - $ref: "#/components/parameters/DashboardId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DashboardLayout"
      responses:
        "204":
          description: Layout accepted
        "400":
          description: Invalid layout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      operationId: resetDashboardLayout
      summary: Restore dashboard layout from dashboard-layouts.orig.json (read-only baseline on disk)
      tags: [Dashboard]
      parameters:
        - $ref: "#/components/parameters/DashboardId"
      responses:
        "200":
          description: Layout after reset (same shape as GET layout)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardLayout"
        "400":
          description: Baseline file exists but layout for this id is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "404":
          description: Baseline file missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /dashboards/{dashboardId}/layout/save-file:
    post:
      operationId: postDashboardLayoutSaveFile
      summary: Persist layout to live store and write a timestamped JSON snapshot on disk
      tags: [Dashboard]
      parameters:
        - $ref: "#/components/parameters/DashboardId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DashboardLayout"
      responses:
        "200":
          description: Layout stored; snapshot filename on the server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardLayoutSaveFileResponse"
        "400":
          description: Invalid layout or JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
  /events/stream:
    get:
      operationId: streamFabricEvents
      summary: Server-sent events for live dashboard tiles (namespaced topics)
      tags: [Events]
      parameters:
        - name: access_token
          in: query
          required: false
          description: >
            Dev escape hatch when browsers cannot set Authorization on EventSource;
            must match configured API token when auth is enabled.
          schema:
            type: string
      responses:
        "200":
          description: >
            SSE stream (`text/event-stream`). Each event carries a JSON body matching FabricEvent.
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  data: {"topic":"fabric.perf.updated","occurred_at":"2026-04-22T10:05:01Z","payload":{}}

                  data: {"topic":"fabric.discovery.updated","occurred_at":"2026-04-22T10:05:02Z","payload":{}}

  /dhcp/pools:
    get:
      operationId: listDhcpPools
      summary: DHCP address pools (Kea-agnostic DTO)
      tags: [DHCP]
      parameters:
        - $ref: "#/components/parameters/ListLimit"
        - $ref: "#/components/parameters/ListCursor"
        - $ref: "#/components/parameters/ListSort"
        - $ref: "#/components/parameters/ListFilter"
      responses:
        "200":
          description: Pool collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DhcpPoolListResponse"
  /dhcp/clients:
    get:
      operationId: listDhcpClients
      summary: Active DHCP clients (Kea-agnostic DTO)
      tags: [DHCP]
      parameters:
        - $ref: "#/components/parameters/ListLimit"
        - $ref: "#/components/parameters/ListCursor"
        - $ref: "#/components/parameters/ListSort"
        - $ref: "#/components/parameters/ListFilter"
      responses:
        "200":
          description: Client collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DhcpClientListResponse"
  /dhcp/clients/{clientId}:
    patch:
      operationId: patchDhcpClient
      summary: Update editable DHCP client fields
      tags: [DHCP]
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DhcpClientPatchRequest"
      responses:
        "200":
          description: Updated client row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DhcpClient"
  /dhcp/reservations:
    get:
      operationId: listDhcpReservations
      summary: Static reservations / fixed assignments
      tags: [DHCP]
      parameters:
        - $ref: "#/components/parameters/ListLimit"
        - $ref: "#/components/parameters/ListCursor"
        - $ref: "#/components/parameters/ListSort"
        - $ref: "#/components/parameters/ListFilter"
      responses:
        "200":
          description: Reservation collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DhcpReservationListResponse"
  /dhcp/reservations/{reservationId}:
    patch:
      operationId: patchDhcpReservation
      summary: Update editable DHCP reservation fields
      tags: [DHCP]
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DhcpReservationPatchRequest"
      responses:
        "200":
          description: Updated reservation row
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DhcpReservation"
  /discovery/records:
    get:
      operationId: listDiscoveryRecords
      summary: Discovery snapshot (normalized records)
      tags: [Discovery]
      parameters:
        - $ref: "#/components/parameters/ListLimit"
        - $ref: "#/components/parameters/ListCursor"
        - $ref: "#/components/parameters/ListSort"
        - $ref: "#/components/parameters/ListFilter"
      responses:
        "200":
          description: Discovery records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryRecordListResponse"
  /discovery/scan:
    get:
      operationId: getDiscoveryScan
      summary: Discovery scan status for toolbar and controls
      tags: [Discovery]
      responses:
        "200":
          description: Scan status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryScanResponse"
  /discovery/scan/pause:
    post:
      operationId: pauseDiscoveryScan
      summary: Pause or resume an active discovery scan (idempotent)
      tags: [Discovery]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoveryPauseRequest"
      responses:
        "200":
          description: Updated scan status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryScanResponse"
  /perf/summary:
    get:
      operationId: getPerfSummary
      summary: Aggregate host performance snapshot for dashboard cards
      tags: [Performance]
      responses:
        "200":
          description: Performance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PerfSummaryResponse"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        When `KEA_FABRIC_API_TOKEN` / `KEA_FABRIC_API_VIEWER_TOKEN` are set, send
        `Authorization: Bearer <token>`. Viewer token allows reads only; operator allows writes.
  parameters:
    DashboardId:
      name: dashboardId
      in: path
      required: true
      schema:
        type: string
    ListLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 500
    ListCursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    ListSort:
      name: sort
      in: query
      required: false
      schema:
        type: string
        description: Server-defined sort key (e.g. assigned_address:asc)
    ListFilter:
      name: filter
      in: query
      required: false
      schema:
        type: string
        description: Opaque filter expression evaluated server-side
  schemas:
    NebulaReplicationSummary:
      type: object
      additionalProperties: false
      required: [status, observed_at]
      properties:
        status:
          type: string
          enum: [healthy, lagging, disconnected, unknown]
        observed_at:
          type: string
          format: date-time
        partner_id:
          type: string
          nullable: true
        detail:
          type: string
          nullable: true
    ProblemDetails:
      type: object
      additionalProperties: true
      description: RFC 7807-style problem (fields may vary)
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, checked_at]
      properties:
        status:
          type: string
          enum: [ok, degraded, down]
        checked_at:
          type: string
          format: date-time
        dependencies:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [name, status]
            properties:
              name:
                type: string
              status:
                type: string
                enum: [ok, degraded, down]
              detail:
                type: string
                nullable: true
    FabricEvent:
      type: object
      additionalProperties: false
      required: [topic, occurred_at, payload]
      properties:
        topic:
          type: string
          description: Namespaced topic (e.g. fabric.perf.updated)
        occurred_at:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
    TileOptions:
      type: object
      additionalProperties: false
      properties:
        cpu_total:
          type: boolean
          description: When true, CPU is shown as a single aggregate gauge.
        network_by_adapter:
          type: boolean
        disk_by_volume:
          type: boolean
        display_style:
          type: string
          enum: [gauge, percent_only]
        gauge_gradient_mode:
          type: string
          enum: [smooth, banded]
          description: >
            Perf semicircle gauge fill. Omitted defaults to smooth gradient between threshold colours.
        perf_max_cols:
          type: integer
          minimum: 1
          maximum: 20
          description: >
            Max dashboard columns for a performance tile; extra gauges wrap inside the tile.
    GridPlacement:
      type: object
      additionalProperties: false
      required: [col, row, colSpan, rowSpan]
      description: >
        20-column grid cell for root and auto-wrap groups. Server validates col + colSpan <= 20 when present.
      properties:
        col:
          type: integer
          minimum: 0
          maximum: 10000
        row:
          type: integer
          minimum: 0
        colSpan:
          type: integer
          minimum: 1
          maximum: 20
        rowSpan:
          type: integer
          minimum: 1
          maximum: 12
          description: Tile height in grid rows (same cap as layout.schema.json).
    DashboardTile:
      type: object
      additionalProperties: false
      required: [id, pluginId, hostControl, displayMode]
      properties:
        id:
          type: string
        pluginId:
          type: string
        hostControl:
          type: string
          enum: [single-panel, tab-control, vertical-stack, split-grid]
        displayMode:
          type: string
          enum: [compact, full]
        region:
          type: string
          nullable: true
        rowPanel:
          type: string
          minLength: 1
          maxLength: 64
          description: v1 only; optional row panel id. v2 uses DashboardGroup instead.
        kind:
          type: string
          enum: [tile]
          description: v2 root tiles may set kind to `tile` (optional; same fields as inner tiles).
        grid:
          $ref: "#/components/schemas/GridPlacement"
        options:
          $ref: "#/components/schemas/TileOptions"
    DashboardGroup:
      type: object
      additionalProperties: false
      required: [kind, id, children]
      description: >
        Root-level container on the 12-column grid; inner tiles share the same column contract
        as the main dashboard (see specs/dashboard/layout.schema.json).
      properties:
        kind:
          type: string
          enum: [group]
        id:
          type: string
          minLength: 1
        showBorder:
          type: boolean
          description: When true, draw a border on the group and hide inner tile card chrome. Default true if omitted.
        grid:
          $ref: "#/components/schemas/GridPlacement"
        children:
          type: array
          items:
            $ref: "#/components/schemas/DashboardTile"
    RootLayoutItem:
      oneOf:
        - $ref: "#/components/schemas/DashboardGroup"
        - $ref: "#/components/schemas/DashboardTile"
      description: v2 root row is an array of groups and/or tiles (kind discriminates group vs tile).
    DashboardLayoutV1:
      type: object
      additionalProperties: false
      required: [version, tiles]
      properties:
        version:
          type: integer
          enum: [1]
        tiles:
          type: array
          items:
            $ref: "#/components/schemas/DashboardTile"
    DashboardLayoutV2:
      type: object
      additionalProperties: false
      required: [version, items]
      properties:
        version:
          type: integer
          enum: [2]
        items:
          type: array
          items:
            $ref: "#/components/schemas/RootLayoutItem"
    DashboardLayout:
      oneOf:
        - $ref: "#/components/schemas/DashboardLayoutV1"
        - $ref: "#/components/schemas/DashboardLayoutV2"
      description: >
        v1 is a flat `tiles` array. v2 uses `items` with nested `group` containers and optional
        `kind` on root tiles. Validated server-side against specs/dashboard/layout.schema.json.
    DashboardLayoutSaveFileResponse:
      type: object
      additionalProperties: false
      required: [filename]
      properties:
        filename:
          type: string
          description: >
            Basename of the snapshot written under ``dashboard-layout-exports/`` next to
            ``dashboard-layouts.json`` (e.g. ``Dashboard_Layout_2026-04-25_153045.json``).
    DiscoveryPauseRequest:
      type: object
      additionalProperties: false
      required: [paused]
      properties:
        paused:
          type: boolean
    DiscoveryScanResponse:
      type: object
      additionalProperties: false
      required: [state, updated_at]
      properties:
        state:
          type: string
          enum: [idle, running, paused, failed]
        updated_at:
          type: string
          format: date-time
        record_count:
          type: integer
          minimum: 0
          nullable: true
    MetaResponse:
      type: object
      additionalProperties: false
      required: [api_version, service]
      properties:
        api_version:
          type: string
          example: "1.0.0"
        service:
          type: string
          example: kea-fabric
        dashboard_embed_auth:
          type: string
          enum: [none, signed]
          description: Whether embed surfaces require a launch token
    UiDashboardManifest:
      type: object
      additionalProperties: false
      required:
        - allowed_host_controls
        - default_size_hint
        - supports_compact
        - supports_full
      properties:
        allowed_host_controls:
          type: array
          items:
            type: string
            enum:
              - single-panel
              - tab-control
              - vertical-stack
              - split-grid
        default_size_hint:
          type: string
        min_size:
          type: string
          nullable: true
        max_size:
          type: string
          nullable: true
        compact_min_footprint:
          type: string
          nullable: true
        supports_compact:
          type: boolean
        supports_full:
          type: boolean
    PluginEntry:
      type: object
      additionalProperties: false
      required: [id, name, enabled]
      properties:
        id:
          type: string
          description: Stable plugin identifier (e.g. dhcp.pools)
        name:
          type: string
        enabled:
          type: boolean
        ui_dashboard:
          $ref: "#/components/schemas/UiDashboardManifest"
    PluginListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/PluginEntry"
    DhcpPool:
      type: object
      additionalProperties: false
      required: [id, subnet_cidr, range_start, range_end]
      properties:
        id:
          type: string
        subnet_cidr:
          type: string
          description: Subnet in CIDR notation
        range_start:
          type: string
          description: First address in pool (inclusive)
        range_end:
          type: string
          description: Last address in pool (inclusive)
        dns_domain:
          type: string
          nullable: true
    DhcpPoolListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DhcpPool"
    DhcpClient:
      type: object
      additionalProperties: false
      required: [id, hardware_address, assigned_address, pool_id]
      properties:
        id:
          type: string
        hardware_address:
          type: string
          description: Client MAC or stable L2 identifier
        assigned_address:
          type: string
        pool_id:
          type: string
        hostname:
          type: string
          nullable: true
        client_category:
          type: string
          nullable: true
          description: UI category for icon mapping (e.g. workstation, infra)
        vendor_name:
          type: string
          nullable: true
        scan_status:
          type: string
          nullable: true
        lease_started_at:
          type: string
          format: date-time
          nullable: true
        lease_expires_at:
          type: string
          format: date-time
          nullable: true
        subnet_cidr:
          type: string
          nullable: true
        services:
          type: array
          items:
            type: string
          description: Logical service tags (e.g. ssh, mdns)
    DhcpClientListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DhcpClient"
    DhcpClientPatchRequest:
      type: object
      additionalProperties: false
      properties:
        hostname:
          type: string
          nullable: true
        vendor_name:
          type: string
          nullable: true
      minProperties: 1
    DhcpReservation:
      type: object
      additionalProperties: false
      required: [id, hardware_address, reserved_address]
      properties:
        id:
          type: string
        hardware_address:
          type: string
        reserved_address:
          type: string
        hostname:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
          description: Reservation category badge (e.g. STATIC)
        subnet_cidr:
          type: string
          nullable: true
        vendor_name:
          type: string
          nullable: true
        scan_status:
          type: string
          nullable: true
        services:
          type: array
          items:
            type: string
    DhcpReservationListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DhcpReservation"
    DhcpReservationPatchRequest:
      type: object
      additionalProperties: false
      properties:
        hardware_address:
          type: string
        reserved_address:
          type: string
        hostname:
          type: string
          nullable: true
      minProperties: 1
    DiscoveryRecord:
      type: object
      additionalProperties: false
      required: [id, last_seen_at, state]
      properties:
        id:
          type: string
        last_seen_at:
          type: string
          format: date-time
        state:
          type: string
          enum: [active, stale, lost]
        addresses:
          type: array
          items:
            type: string
        labels:
          type: object
          additionalProperties:
            type: string
    DiscoveryRecordListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveryRecord"
    NetworkAdapterSample:
      type: object
      additionalProperties: false
      required: [name, in_mbps, out_mbps]
      properties:
        name:
          type: string
        in_mbps:
          type: number
          format: float
        out_mbps:
          type: number
          format: float
    DiskVolumeSample:
      type: object
      additionalProperties: false
      required: [label, used_percent]
      properties:
        label:
          type: string
        used_percent:
          type: number
          format: float
          minimum: 0
          maximum: 100
    PerfSummaryResponse:
      type: object
      additionalProperties: false
      required:
        - cpu_percent_total
        - memory_used_percent
        - collected_at
      properties:
        cpu_percent_total:
          type: number
          format: float
          minimum: 0
          maximum: 100
        cpu_core_percent:
          type: array
          items:
            type: number
            format: float
          description: Optional per-core utilization percentages (0–100 each)
        memory_used_percent:
          type: number
          format: float
          minimum: 0
          maximum: 100
        memory_used_bytes:
          type: integer
          format: int64
          nullable: true
        memory_total_bytes:
          type: integer
          format: int64
          nullable: true
        network_in_mbps:
          type: number
          format: float
          nullable: true
        network_out_mbps:
          type: number
          format: float
          nullable: true
        network_adapters:
          type: array
          items:
            $ref: "#/components/schemas/NetworkAdapterSample"
        disk_used_percent:
          type: number
          format: float
          nullable: true
        disk_volumes:
          type: array
          items:
            $ref: "#/components/schemas/DiskVolumeSample"
        collected_at:
          type: string
          format: date-time
