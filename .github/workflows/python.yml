name: python

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: python-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Sync (locked) and verify
        run: |
          uv sync --extra dev --locked
          bash scripts/compile_python_tree.sh
          uv run ruff check src tests scripts
          uv run mypy src tests
          uv run pytest --cov=kea_fabric --cov-report=term-missing -q
          uv run python scripts/check_openapi_drift.py
          uv run python scripts/validate_specs.py
          uv build
          uv run python scripts/check_release_artifacts.py
