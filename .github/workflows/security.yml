# Blocking secret scan (gitleaks) + SBOM (Syft CycloneDX) + vulns (Grype, --fail-on high).
# Tool versions pinned below; bump intentionally when upgrading scanners.

name: security

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITLEAKS_VER: "8.30.1"
      SYFT_VER: "1.42.4"
      GRYPE_VER: "0.111.0"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VER}/gitleaks_${GITLEAKS_VER}_linux_x64.tar.gz" | sudo tar -xz -C /usr/local/bin gitleaks

      - name: Gitleaks (blocking)
        run: gitleaks detect --source . --config .gitleaks.toml --verbose --no-banner

      - name: Install Syft
        run: |
          curl -sSfL "https://github.com/anchore/syft/releases/download/v${SYFT_VER}/syft_${SYFT_VER}_linux_amd64.tar.gz" | sudo tar -xz -C /usr/local/bin syft

      - name: Generate CycloneDX SBOM (Syft)
        run: |
          syft scan dir:. \
            --exclude '**/REF_ONLY/**' \
            --exclude '**/site/**' \
            --exclude '**/node_modules/**' \
            --exclude '**/.venv/**' \
            -o cyclonedx-json=sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          if-no-files-found: error

      - name: Install Grype
        run: |
          curl -sSfL "https://github.com/anchore/grype/releases/download/v${GRYPE_VER}/grype_${GRYPE_VER}_linux_amd64.tar.gz" | sudo tar -xz -C /usr/local/bin grype

      # Default cache path on ubuntu-latest ($HOME=/home/runner); speeds repeat runs.
      - name: Cache Grype vulnerability DB
        uses: actions/cache@v5
        with:
          path: /home/runner/.cache/grype
          key: grype-db-${{ env.GRYPE_VER }}-${{ runner.os }}

      - name: Grype vulnerability scan (blocking, --fail-on high)
        run: grype sbom:sbom.cdx.json --fail-on high
