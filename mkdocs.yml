  - Operator demo: operator-demo.md
  - Operator:
      - README: operator/README.md
      - Install: operator/install.md
      - Configure: operator/configure.md
      - Upgrade: operator/upgrade.md
      - Backup & restore: operator/backup-restore.md
      - Troubleshooting: operator/troubleshooting.md
      - Runbooks:
          - README: operator/runbooks/README.md
          - Kea control agent unreachable: operator/runbooks/kea-control-agent-unreachable.md
          - Plugin quarantined: operator/runbooks/plugin-quarantined.md
          - Plugins diagnostics: operator/runbooks/plugins-diagnostics.md
          - Policy denied or pending approval: operator/runbooks/policy-denied-or-pending-approval.md
          - Warm standby failover: operator/runbooks/warm-standby-failover.md
  - Plugin development:
      - README: plugin-dev/README.md
