site_name: Kea Fabric
site_dir: site
docs_dir: docs
repo_url: https://github.com/GriffinAD/kea-fabric
repo_name: GriffinAD/kea-fabric
strict: true

# This documentation-first clone may cite ADRs and repo-root paths that are not
# yet vendored under docs/. Tighten to `warn` when the full ADR set lives in-tree.
validation:
  links:
    not_found: ignore

exclude_docs: |
  _templates/

theme:
  name: material
  features:
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mermaid2:
      arguments:
        theme: neutral

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom

nav:
  - Home: README.md
  - Governance:
      - Product naming: _governance/NAMING.md
      - Reviewers: _governance/REVIEWERS.md
  - ADRs: adr/README.md
  - Architecture:
      - README: architecture/README.md
      - DOC_STANDARDS: architecture/DOC_STANDARDS.md
      - Glossary: architecture/glossary.md
      - Principles: architecture/principles.md
      - Overview: architecture/overview.md
      - Invariants: architecture/invariants.md
      - Threat model: architecture/threat-model.md
      - Core runtime: architecture/core-runtime.md
      - Plugins: architecture/plugins.md
      - Contracts: architecture/contracts.md
      - Events: architecture/events.md
      - API: architecture/api.md
      - UI: architecture/ui.md
      - Security: architecture/security.md
      - Kea integration: architecture/kea-integration.md
      - Data: architecture/data.md
      - Config: architecture/config.md
      - Brokers: architecture/brokers.md
      - Observability: architecture/observability.md
      - Marketplace: architecture/marketplace.md
      - Nebula sync: architecture/nebula-sync.md
      - Scheduler: architecture/scheduler.md
      - Discovery: architecture/discovery.md
      - Versioning: architecture/versioning.md
      - Error taxonomy: architecture/error-taxonomy.md
      - Concurrency model: architecture/concurrency-model.md
      - Testing: architecture/testing.md
      - Packaging: architecture/packaging.md
      - CI/CD: architecture/cicd.md
      - Deployment: architecture/deployment.md
      - Release process: architecture/release-process.md
      - i18n: architecture/i18n.md
      - Performance: architecture/performance.md
      - Data governance: architecture/data-governance.md
      - Platform support: architecture/platform-support.md
      - Future considerations: architecture/future-considerations.md
      - UI design system: architecture/ui-design-system.md
      - UI themes: architecture/ui-themes.md
      - UI icons: architecture/ui-icons.md
      - UI fonts: architecture/ui-fonts.md
      - UI assets: architecture/ui-assets.md
      - Dashboard blueprint: architecture/dashboard-plugin-blueprint.md
      - Reference ledger: architecture/reference-ledger.md
